name: Build Windows Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build EXE installer
        run: .\gradlew.bat packageExe

      - name: Zip Windows installer output
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/compose/binaries/main-exe/*" `
            -DestinationPath "build/compose/binaries/RunnerSheetInput-windows-exe.zip" `
            -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunnerSheetInput-windows-exe
          path: |
            build/compose/binaries/main-exe/**
            build/compose/binaries/RunnerSheetInput-windows-exe.zip
          if-no-files-found: error
